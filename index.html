<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orbit Sync</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="topBar">
    <span class="stat-box">🪙 <span id="coinCount">0</span></span>
    <span class="stat-box">❤️ <span id="livesCount">3</span></span>
    <span class="stat-box" id="multiplierBox">🔥 x<span id="multiplierCount">1</span></span>
  </div>

  <div id="ui">
    <h1 id="scoreDisplay">0</h1>
    <h2 id="stageDisplay">Stage 1-1</h2>
    <p id="tutorialText">Tap when inside the zone.</p>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="screenOverlay">
    <h1 class="crash-text" id="screenTitle">OUT OF SYNC</h1>
    <p id="screenSubtitle">Failed on Stage 1-1</p>
    <p style="color: #ffaa00; font-weight: bold; font-size: 1.2rem;">Run Coins: <span id="runCoinsDisplay">0</span></p>
    
    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
      <button id="actionBtn" onclick="startGame()">Restart World</button>
      <button id="menuBtn" style="background: transparent; color: #888; border: 2px solid #555; font-size: 1rem; padding: 10px 20px;" onclick="alert('Main Menu coming soon! (Ad Revives will go here)')">Main Menu</button>
    </div>
  </div>

  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
