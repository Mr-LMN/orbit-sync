<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orbit Sync</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="topBar" style="display: none;">
    <div class="top-stat">COINS <span id="coinCount">0</span></div>
    <div class="top-stat">LIVES <span id="livesCount">3</span></div>
    <div class="top-stat" id="streakBox">STREAK <span id="streakCount">0</span></div>
  </div>

  <div id="bigMultiplier" style="display: none;">x<span id="multiplierCount">1</span></div>

  <div id="bossUI" style="display: none;">
    <span class="boss-title">BOSS HP</span>
    <div class="boss-bar-container">
      <div id="bossPhase1" class="boss-segment active-segment"></div>
      <div id="bossPhase2" class="boss-segment active-segment"></div>
    </div>
  </div>

  <div id="ui" style="display: none;">
    <h1 id="scoreDisplay">0</h1>
    <h2 id="stageDisplay">Stage 1-1</h2>
    <h3 id="waveDisplay">WAVE 1 / 5</h3>
    <p id="tutorialText">Tap when inside the zone.</p>
  </div>

  <div id="mainMenu">
    <h1 class="title">ORBIT</h1>
    <h1 class="title" style="color:#fff; text-shadow:none; margin-bottom: 20px;">SYNC</h1>
    <button class="btn btn-play" onclick="startCampaign()">Play</button><br>
    <button class="btn btn-shop" onclick="toggleShop(true)">Shop</button>
  </div>

  <div id="shopModal">
    <div class="shop-header">
      <h2>Armory</h2>
      <div style="font-size: 1.5rem; color: #ffaa00; font-weight: bold;">🪙 <span id="shopCoinCount">0</span></div>
      <button class="close-btn" onclick="toggleShop(false)">×</button>
    </div>
    <div class="shop-content">
      <div class="shop-item" id="item-classic">
        <div class="item-preview" style="background:#fff; box-shadow: 0 0 10px #fff; border-radius: 50%;"></div>
        <p class="item-name">Classic Core</p>
        <button class="buy-btn" id="btn-classic" onclick="equipSkin('classic')">Equipped</button>
      </div>
      <div class="shop-item" id="item-skull">
        <div class="item-preview" style="color: #00e5ff; text-shadow: none;">💀</div>
        <p class="item-name">Neon Skull</p>
        <button class="buy-btn buy-coins" id="btn-skull" onclick="buyItem('skull', 50)">COINS 50</button>
      </div>
      <div class="shop-item" id="item-fire">
        <div class="item-preview" style="color: #ffaa00; text-shadow: none;">🔥</div>
        <p class="item-name">Demon Core</p>
        <button class="buy-btn buy-coins" id="btn-fire" onclick="buyItem('fire', 150)">COINS 150</button>
      </div>
    </div>
  </div>

  <div id="screenOverlay">
    <h1 id="screenTitle">OUT OF SYNC</h1>
    <p id="screenSubtitle">Failed on Stage 1-1</p>
    <div class="run-coins-box">COINS +<span id="runCoinsDisplay">0</span></div>
    <div id="pbStatsBlock" style="display:flex; gap:20px; margin-bottom:20px; justify-content:center; flex-wrap:wrap;">
      <div class="pb-stat" id="pbScoreBlock">
        <div class="pb-label">BEST SCORE</div>
        <div class="pb-value" id="pbScoreDisplay">0</div>
      </div>
      <div class="pb-stat" id="pbStreakBlock">
        <div class="pb-label">BEST STREAK</div>
        <div class="pb-value" id="pbStreakDisplay">0</div>
      </div>
      <div class="pb-stat" id="pbWorldBlock">
        <div class="pb-label">BEST WORLD</div>
        <div class="pb-value" id="pbWorldDisplay">1</div>
      </div>
    </div>

    <div id="newRecordBanner" style="display:none; color:#ffaa00; font-family:'Orbitron',sans-serif; font-size:0.9rem; letter-spacing:4px; margin-bottom:15px;">
      ★ NEW RECORD ★
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px;">
      <button id="reviveBtn" class="btn" style="background: #ffaa00; color: #0f0f13; box-shadow: 0 0 15px rgba(255,170,0,0.6); display: none;">Revive (🪙 50)</button>
      <button id="actionBtn" class="btn btn-play">Restart World</button>
      <button id="menuBtn" class="btn btn-shop">Main Menu</button>
    </div>
  </div>

  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
